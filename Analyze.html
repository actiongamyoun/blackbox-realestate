<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>매물 분석 — 부동산 블랙박스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#041627"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-32.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f8f9fb;color:#1b1c1d;min-height:100vh;display:flex;flex-direction:column;}

/* 헤더 */
.hd{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:58px;background:#fff;border-bottom:1px solid #dde0e6;position:sticky;top:0;z-index:50;}
.hd-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.hd-logo-icon{width:34px;height:34px;border-radius:8px;background:#041627;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hd-logo-name{font-size:15px;font-weight:900;color:#041627;letter-spacing:-0.3px;line-height:1.1;}
.hd-logo-eng{font-size:9px;color:#8192a7;letter-spacing:1.5px;font-family:'IBM Plex Mono',monospace;}
.hd-back{display:flex;align-items:center;gap:6px;font-size:14px;color:#74777d;cursor:pointer;background:none;border:none;font-family:inherit;padding:6px 10px;border-radius:6px;transition:background .12s;}
.hd-back:hover{background:#f5f3f4;color:#041627;}

/* 메인 */
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px 60px;}

/* 안내 헤더 */
.page-head{text-align:center;margin-bottom:36px;}
.page-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;background:#041627;font-size:12px;color:#fff;margin-bottom:16px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.5px;}
.page-badge-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;}
.page-title{font-size:32px;font-weight:900;color:#041627;letter-spacing:-1px;margin-bottom:10px;line-height:1.2;}
.page-sub{font-size:16px;color:#74777d;line-height:1.7;}

/* 분석 카드 */
.analyze-card{
  width:100%;max-width:560px;
  background:#fff;
  border:1.5px solid #041627;
  border-radius:16px;
  padding:28px 24px;
  box-shadow:0 4px 24px rgba(4,22,39,.08);
}

/* STEP 라벨 */
.step-label{
  display:flex;align-items:center;gap:8px;
  font-size:11px;font-weight:700;letter-spacing:1.5px;
  color:#8192a7;text-transform:uppercase;
  margin-bottom:8px;font-family:'IBM Plex Mono',monospace;
}
.step-circle{
  width:20px;height:20px;border-radius:50%;
  background:#041627;color:#fff;
  font-size:10px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono',monospace;
}
.step-circle.done{background:#22c55e;}

/* 입력 */
.addr-input{
  width:100%;padding:13px 14px;
  border:1px solid #c4c6cd;border-radius:8px;
  font-size:15px;font-family:inherit;
  outline:none;color:#041627;background:#fff;
  transition:border .15s;
}
.addr-input:focus{border-color:#041627;}
.addr-input::placeholder{color:#aaa;}

/* 자동완성 */
.suggestions-wrap{
  position:relative;width:100%;margin-top:-1px;
  display:none;z-index:50;
}
.suggestions-box{
  background:#fff;border:1px solid #c4c6cd;
  border-top:none;border-radius:0 0 8px 8px;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
  max-height:240px;overflow-y:auto;
}
.sug-item{
  padding:12px 16px;font-size:14px;cursor:pointer;
  border-bottom:0.5px solid #f0f0ee;
  display:flex;gap:10px;align-items:flex-start;
  transition:background .1s;
}
.sug-item:last-child{border-bottom:none;}
.sug-item:hover,.sug-item.active{background:#f5f3f4;}
.sug-pin{color:#8192a7;font-size:12px;flex-shrink:0;margin-top:2px;}
.sug-road{font-weight:600;color:#041627;font-size:14px;}
.sug-jibun{font-size:12px;color:#8192a7;margin-top:2px;}

/* 구분선 */
.divider{border:none;border-top:1px dashed #e4e7ec;margin:20px 0;}

/* 상세주소 */
.selected-addr-tag{
  display:flex;align-items:center;gap:8px;
  background:#f0f4ff;border-radius:6px;
  padding:8px 12px;margin-bottom:10px;
  font-size:13px;font-weight:600;color:#041627;
}
.selected-addr-tag svg{flex-shrink:0;}

/* 분석 버튼 */
.analyze-btn{
  width:100%;padding:16px;margin-top:16px;
  background:#041627;color:#fff;
  font-size:16px;font-weight:900;
  border:none;border-radius:10px;
  cursor:pointer;font-family:inherit;
  transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.analyze-btn:hover:not(:disabled){opacity:.88;transform:translateY(-1px);}
.analyze-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}

/* 힌트 */
.hint{font-size:12px;color:#8192a7;margin-top:8px;line-height:1.6;}
.hint-red{color:#dc2626;}

/* 로딩 스피너 */
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}

/* 모바일 */
@media(max-width:600px){
  .hd{padding:0 16px;height:52px;}
  .hd-logo-name{font-size:14px;}
  .main{padding:28px 16px 48px;}
  .page-title{font-size:26px;}
  .page-sub{font-size:14px;}
  .analyze-card{padding:22px 18px;}
  .addr-input{font-size:14px;padding:12px 13px;}
}
</style>
</head>
<body>

<!-- 헤더 -->
<header class="hd">
  <a href="/" class="hd-logo">
    <div class="hd-logo-icon">
      <svg viewBox="0 0 22 22" fill="none" width="20" height="20">
        <path d="M11 2.5L2.5 9.5V20H8.5V15H13.5V20H19.5V9.5L11 2.5Z" fill="white"/>
        <rect x="8.5" y="12" width="5" height="6" rx="1" fill="#041627"/>
        <rect x="9.3" y="13.5" width="3.4" height="2.8" rx="0.5" fill="white"/>
        <path d="M10.2 13.5V12.6a0.8 0.8 0 011.6 0v0.9" stroke="white" stroke-width="1" stroke-linecap="round" fill="none"/>
        <circle cx="11" cy="14.9" r="0.5" fill="#041627"/>
      </svg>
    </div>
    <div>
      <div class="hd-logo-name">부동산 블랙박스</div>
      <div class="hd-logo-eng">REAL ESTATE BLACKBOX</div>
    </div>
  </a>
  <button class="hd-back" onclick="history.back()">
    ← 돌아가기
  </button>
</header>

<!-- 메인 -->
<main class="main">
  <div class="page-head">
    <div class="page-badge">
      <div class="page-badge-dot"></div>
      AI 안전 분석
    </div>
    <h1 class="page-title">매물 주소를 입력하세요</h1>
    <p class="page-sub">
      도로명 주소 검색 후 상세주소(동·호수)를 입력하면<br>
      AI가 3분 안에 위험 요소를 분석합니다
    </p>
  </div>

  <div class="analyze-card">

    <!-- STEP 1 -->
    <div class="step-label">
      <div class="step-circle" id="step1-circle">1</div>
      도로명 주소 검색
    </div>
    <input class="addr-input" id="addr-input" type="text"
      placeholder="도로명 주소 입력 (예: 역삼로 123, 센텀순환로 33)"
      autocomplete="off"
      oninput="onInput(this.value)"
      onkeydown="onKeydown(event)"/>

    <!-- 자동완성 드롭다운 -->
    <div class="suggestions-wrap" id="sug-wrap">
      <div class="suggestions-box" id="sug-box"></div>
    </div>

    <!-- STEP 2 (주소 선택 후 표시) -->
    <div id="step2-wrap" style="display:none;">
      <hr class="divider"/>
      <div class="step-label">
        <div class="step-circle done" id="step2-circle">✓</div>
        상세 주소 입력 <span class="hint-red" style="font-size:11px;font-weight:700;">* 필수</span>
      </div>
      <!-- 선택된 도로명 태그 -->
      <div class="selected-addr-tag" id="selected-tag">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="6" r="3" stroke="#041627" stroke-width="1.3"/>
          <path d="M7 9c-2.5 0-4.5 1-4.5 2h9c0-1-2-2-4.5-2z" fill="#041627"/>
        </svg>
        <span id="selected-road-text"></span>
      </div>
      <input class="addr-input" id="detail-input" type="text"
        placeholder="동·층·호수 입력 (예: 102동 1203호, 3층 301호)"
        oninput="onDetailInput()"
        onkeydown="if(event.key==='Enter') doAnalyze()"/>
      <div class="hint">아파트·오피스텔은 동·호수, 빌라·단독주택은 층·호수를 입력하세요</div>
    </div>

    <!-- 분석 버튼 -->
    <button class="analyze-btn" id="analyze-btn" disabled onclick="doAnalyze()">
      주소를 먼저 검색하세요
    </button>

  </div>
</main>

<script>
let _suggs = [], _selIdx = -1, _debounce = null;
let _selectedAddr = null;

// ── 주소 입력 ──
function onInput(val) {
  clearTimeout(_debounce);
  _selIdx = -1;
  if (val.length < 2) { hideSugg(); return; }
  _debounce = setTimeout(() => fetchSugg(val), 300);
}

async function fetchSugg(query) {
  try {
    const res  = await fetch('/api/address?query=' + encodeURIComponent(query));
    const data = await res.json();
    if (!data.ok || !data.results?.length) { hideSugg(); return; }
    _suggs = data.results;
    renderSugg(_suggs);
  } catch(e) { hideSugg(); }
}

function renderSugg(list) {
  const wrap = document.getElementById('sug-wrap');
  const box  = document.getElementById('sug-box');
  if (!list.length) { hideSugg(); return; }
  box.innerHTML = list.map((s, i) => `
    <div class="sug-item" data-idx="${i}" onclick="selectSugg(${i})">
      <span class="sug-pin">📍</span>
      <div>
        <div class="sug-road">${s.roadAddr}</div>
        <div class="sug-jibun">${s.jibunAddr}${s.bdNm ? ' · ' + s.bdNm : ''}</div>
      </div>
    </div>`).join('');
  wrap.style.display = 'block';
}

function selectSugg(idx) {
  const s = _suggs[idx];
  if (!s) return;
  _selectedAddr = s;

  // 입력창에 선택된 주소
  document.getElementById('addr-input').value = s.roadAddr;

  // STEP1 완료 표시
  const c1 = document.getElementById('step1-circle');
  c1.textContent = '✓';
  c1.style.background = '#22c55e';

  hideSugg();

  // STEP2 표시
  document.getElementById('selected-road-text').textContent = s.roadAddr;
  document.getElementById('step2-wrap').style.display = 'block';
  document.getElementById('detail-input').focus();

  // 버튼 상태 업데이트
  updateBtn();
}

function hideSugg() {
  document.getElementById('sug-wrap').style.display = 'none';
  _suggs = [];
}

// ── 키보드 탐색 ──
function onKeydown(e) {
  if (e.key === 'ArrowDown') {
    _selIdx = Math.min(_selIdx + 1, _suggs.length - 1);
    highlightSugg(_selIdx);
  } else if (e.key === 'ArrowUp') {
    _selIdx = Math.max(_selIdx - 1, 0);
    highlightSugg(_selIdx);
  } else if (e.key === 'Enter' && _selIdx >= 0) {
    selectSugg(_selIdx);
  } else if (e.key === 'Escape') {
    hideSugg();
  }
}

function highlightSugg(idx) {
  document.querySelectorAll('.sug-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

// 외부 클릭 닫기
document.addEventListener('click', e => {
  if (!e.target.closest('#sug-wrap') && e.target.id !== 'addr-input') hideSugg();
});

// ── 상세주소 입력 ──
function onDetailInput() { updateBtn(); }

function updateBtn() {
  const btn    = document.getElementById('analyze-btn');
  const detail = document.getElementById('detail-input')?.value.trim() || '';
  if (_selectedAddr && detail.length >= 2) {
    btn.disabled = false;
    btn.innerHTML = '🔍 분석 시작하기';
  } else if (_selectedAddr) {
    btn.disabled = true;
    btn.innerHTML = '동·호수를 입력하세요';
  } else {
    btn.disabled = true;
    btn.innerHTML = '주소를 먼저 검색하세요';
  }
}

// ── 분석 실행 ──
async function doAnalyze() {
  if (!_selectedAddr) return;
  const detail = document.getElementById('detail-input').value.trim();
  if (!detail) {
    const inp = document.getElementById('detail-input');
    inp.style.outline = '2px solid #dc2626';
    inp.focus();
    setTimeout(() => inp.style.outline = '', 1800);
    return;
  }

  const fullAddr = _selectedAddr.roadAddr + ' ' + detail;
  const btn = document.getElementById('analyze-btn');
  btn.innerHTML = '<span class="spinner"></span> 분석 중...';
  btn.disabled = true;

  try {
    const params = new URLSearchParams({ address: fullAddr });
    if (_selectedAddr.admCd)  params.set('lawdCd',  _selectedAddr.admCd.slice(0, 5));
    if (_selectedAddr.bdMgtSn) params.set('bdMgtSn', _selectedAddr.bdMgtSn);

    const res  = await fetch('/api/analyze?' + params.toString());
    if (!res.ok) throw new Error('서버 오류 ' + res.status);
    const data = await res.json();
    if (!data || !data.ok) throw new Error((data && data.error) || '분석 실패');

    window._analysisResult = data;

    btn.innerHTML = '✓ 분석 완료!';
    btn.style.background = '#166534';

    setTimeout(() => {
      window.location.href = '/pages/report.html'
        + '?address=' + encodeURIComponent(fullAddr)
        + '&score='   + (data.score || 75)
        + '&risk='    + (data.riskLevel || 'warning');
    }, 600);

  } catch(err) {
    console.error(err);
    btn.disabled = false;
    btn.style.background = '';
    btn.innerHTML = '🔍 분석 시작하기';
    if (confirm('API 연결 중입니다. 샘플 리포트를 확인하시겠습니까?')) {
      window.location.href = '/pages/report.html?address=' + encodeURIComponent(fullAddr) + '&score=78&risk=warning';
    }
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
